<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>Profile - GMEcodes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="../images/logo/Mainlogo.png">
    <script defer src="/_vercel/insights/script.js"></script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body class="profile-page">
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: rgb(42, 66, 92);">
        <div class="container">
            <a href="../index.html" class="navbar-brand fw-bold logo"><img src="../images/logo/Mainlogo.png" alt="GMElogo"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="userNav">
                    <!-- User login/register or welcome message will be inserted here -->
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <section class="profile-shell" id="profileShell" style="display:none;">
            <div class="row g-4">
                <div class="col-12 col-lg-5">
                    <article class="card bg-dark text-white shadow-lg border-0 h-100">
                        <div class="card-body p-4">
                            <h2 class="h4 mb-3" id="profileTitle"><i class="bi bi-person-circle me-2"></i>Your Profile</h2>
                            <div class="profile-avatar-wrap mb-3">
                                <img id="profileAvatar" class="profile-avatar-image" src="../images/avatars/avatar-1.svg" alt="Profile picture">
                            </div>
                            <p class="mb-2"><strong>Username:</strong> <span id="profileUsername"></span></p>
                            <p class="mb-2"><strong>Email:</strong> <span id="profileEmail"></span></p>
                            <p class="mb-4"><strong>Member since:</strong> <span id="profileJoined"></span></p>

                            <section id="profilePictureSection" class="mb-4">
                                <h3 class="h6 text-info mb-2">Change Profile Picture</h3>
                                <div id="profileAvatarChoices" class="avatar-choice-grid"></div>
                            </section>

                            <div class="profile-reaction-stats mb-4">
                                <div class="reaction-pill likes-pill">
                                    <i class="bi bi-hand-thumbs-up-fill me-1"></i>
                                    Total Likes Received: <strong id="profileTotalLikes">0</strong>
                                </div>
                                <div class="reaction-pill dislikes-pill">
                                    <i class="bi bi-hand-thumbs-down-fill me-1"></i>
                                    Total Dislikes Received: <strong id="profileTotalDislikes">0</strong>
                                </div>
                            </div>

                            <h3 class="h6 text-info" id="profileDescriptionTitle">Description</h3>
                            <form id="profileDescriptionForm">
                                <textarea id="profileDescription" class="form-control mb-2" rows="4" placeholder="Add a short bio about yourself..."></textarea>
                                <button type="submit" class="btn btn-primary btn-sm" id="profileSaveButton">Save Description</button>
                            </form>
                            <small id="profileSaveStatus" class="d-block mt-2 text-info"></small>
                        </div>
                    </article>
                </div>

                <div class="col-12 col-lg-7">
                    <article class="card bg-dark text-white shadow-lg border-0">
                        <div class="card-body p-4">
                            <h2 class="h4 mb-3" id="profileCommentsTitle"><i class="bi bi-chat-left-text me-2"></i>Your Comments</h2>
                            <div id="profileCommentsList"></div>

                            <section id="profileRepliesSection" class="mt-4">
                                <h3 class="h5 mb-3" id="profileRepliesTitle"><i class="bi bi-reply me-2"></i>Your Replies</h3>
                                <div id="profileRepliesList"></div>
                            </section>

                            <section id="profileIncomingRepliesSection" class="mt-4">
                                <h3 class="h5 mb-3" id="profileIncomingRepliesTitle"><i class="bi bi-chat-dots me-2"></i>Replies You Got</h3>
                                <div id="profileIncomingRepliesList"></div>
                            </section>
                        </div>
                    </article>
                </div>
            </div>
        </section>

        <section class="profile-shell text-center" id="profileNotLoggedIn" style="display:none;">
            <article class="card bg-dark text-white shadow-lg border-0 mx-auto" style="max-width: 560px;">
                <div class="card-body p-4">
                    <h2 class="h4 mb-3">Please log in to view your profile</h2>
                    <a class="btn btn-primary" href="login.html"><i class="bi bi-box-arrow-in-right me-2"></i>Go to Login</a>
                </div>
            </article>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="../javascipt/supabase-config.js"></script>
    <script src="../javascipt/auth.js"></script>
    <script src="../javascipt/profile.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
