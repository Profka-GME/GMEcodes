<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>Logout - GMEcodes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="../images/logo/Mainlogo.png">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: rgb(42, 66, 92);">
        <div class="container">
            <a href="../index.html" class="navbar-brand fw-bold logo">
                <img src="../images/logo/Mainlogo.png" alt="GMElogo" class="">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="userNav">
                    <!-- User login/register or welcome message will be inserted here -->
                </ul>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card bg-dark text-white shadow-lg">
                        <div class="card-body p-5 text-center">
                            <i class="bi bi-box-arrow-right display-1 text-warning mb-4"></i>
                            <h2 class="card-title mb-3">Logout Confirmation</h2>
                            <p class="card-text mb-4">Are you sure you want to log out of your account?</p>

                            <div class="d-grid gap-3">
                                <button id="confirmLogoutBtn" class="btn btn-danger btn-lg">
                                    <i class="bi bi-check-circle me-2"></i>Yes, Logout
                                </button>
                                <a href="../index.html" class="btn btn-secondary btn-lg">
                                    <i class="bi bi-x-circle me-2"></i>Cancel
                                </a>
                            </div>

                            <div id="logoutMessage" class="alert alert-success mt-4" style="display: none;">
                                <i class="bi bi-check-circle me-2"></i>
                                You have been logged out successfully. Redirecting...
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="../javascipt/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const confirmLogoutBtn = document.getElementById('confirmLogoutBtn');
            const logoutMessage = document.getElementById('logoutMessage');

            confirmLogoutBtn.addEventListener('click', function() {
                // Perform logout
                localStorage.removeItem('loggedIn');
                localStorage.removeItem('currentUser');
                window.dispatchEvent(new CustomEvent('userLoggedOut'));

                // Show success message
                logoutMessage.style.display = 'block';
                confirmLogoutBtn.style.display = 'none';

                // Redirect after 2 seconds
                setTimeout(function() {
                    window.location.href = '../index.html';
                }, 2000);
            });
        });
    </script>
</body>
</html>
